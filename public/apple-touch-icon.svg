<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="180" height="180" rx="40" fill="url(#shine)"/>

  <!-- Zap icon (Lucide path, filled white) -->
  <g transform="translate(43.199999999999996, 43.199999999999996) scale(3.9000000000000004)">
    <!-- Lucide zap filled: a lightning bolt polygon -->
    <polygon
      points="13,2 4.5,13.5 11,13.5 10.5,22 19.5,10.5 13,10.5"
      fill="white"
      stroke="none"
    />
  </g>
</svg>